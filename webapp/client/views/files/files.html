
<template name="files_list">
  <div class="files_list" style="position: relative;"> 
    <div class="files-list-content" style="text-align: center;">
      {{#each files}}
        {{> Template.dynamic template=template }}
      {{/each}}
  
    </div>
    {{#if isLoading }} 
      <div style="display: flex; justify-content: center; " >
        <div class="loading"> </div> 
      </div>
    {{/if}}

    <div class="footer" style="position: absolute; bottom: 0; left: 0; right: 0; z-index: -1; height: 100px;"></div>
  </div>
</template>
