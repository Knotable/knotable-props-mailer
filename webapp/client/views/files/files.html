
<template name="files_list">
  <div class="files_list"> 
    <div style="text-align: center;">
      {{#each files}}
        {{> Template.dynamic template=template }}
      {{/each}}
    </div>
    {{#if isLoading }} 
      <div style="display: flex;" >
        <div style="position: relative; margin: 0 auto;">
          <div class="loading-circle"> </div> 
        </div>
      </div>
    {{/if}}
  </div>
</template>
