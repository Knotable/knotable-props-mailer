<Template name="change_due_date_popup">
    <div class="float-popup compose-popup no-print change-due-date-popup">
        <div class="error-message"></div>
        <div class="body">
            <div class="popupWrapper">
                <div class="calendar-body">
                    <div class="pull-left column control-group">
                        <label>Date:</label>
                        <input type="text" class="small due-date" tabindex="11">
                    </div>
                    <div class="pull-right column control-group">
                        <label>Time:</label>
                        <div class="time-picker input-append bootstrap-timepicker input-tran">
                            <input type="text" class="small due-time" tabindex="12">
                            <span class='show-time-picker add-on'><i class="fa fa-clock-o"></i></span>
                        </div>
                    </div>
                    <div class="clearfix"></div>
                    <div class="my-date-picker due-date-picker" tabindex="13"></div>
                    <div class="buttons pull-left">

                    </div>

                    <div class="clearfix"></div>
                </div>
            </div>
        </div>
    </div>
</Template>
