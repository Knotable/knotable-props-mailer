<Template name="change_due_date_popup">
    <div class="float-popup compose-popup no-print change-due-date-popup">
        <div class="error-message"></div>
        <div class="body">
            <div class="popupWrapper">
                <div class="calendar-body">

                    <div class="form-group row">

                        <div class="col-xs-6">
                            <label>Date:</label>
                            <input type="text" class="form-control due-date" tabindex="11">
                        </div>

                        <div class="col-xs-6">
                            <label>Time:</label>
                            <div class="time-picker input-append bootstrap-timepicker input-tran">
                                <input type="text" class="form-control due-time" tabindex="12">
                                <span class='show-time-picker add-on'><i class="fa fa-clock-o"></i></span>
                            </div>
                        </div>

                    </div>

                    <div class="clearfix"></div>
                    <div class="my-date-picker due-date-picker" tabindex="13"></div>
                    <br>
                    <div class="date-from-now">
                        <p class="text-center">Or set time from now</p>

                        <select name="Days" class="pull-left">
                            <option value="0">0 Day</option>
                            <option value="1">1 Day</option>
                            <option value="2">2 Days</option>
                            <option value="3">3 Days</option>
                            <option value="4">4 Days</option>
                            <option value="5">5 Days</option>
                            <option value="6">6 Days</option>
                            <option value="7">7 Days</option>
                            <option value="8">8 Days</option>
                            <option value="9">9 Days</option>
                            <option value="10">10 Days</option>
                            <option value="11">11 Days</option>
                            <option value="12">12 Days</option>
                            <option value="13">13 Days</option>
                            <option value="14">14 Days</option>
                            <option value="15">15 Days</option>
                            <option value="16">16 Days</option>
                            <option value="17">17 Days</option>
                            <option value="18">18 Days</option>
                            <option value="19">19 Days</option>
                            <option value="20">20 Days</option>
                            <option value="21">21 Days</option>
                            <option value="22">22 Days</option>
                            <option value="23">23 Days</option>
                            <option value="24">24 Days</option>
                            <option value="25">25 Days</option>
                            <option value="26">26 Days</option>
                            <option value="27">27 Days</option>
                            <option value="28">28 Days</option>
                            <option value="29">29 Days</option>
                            <option value="30">30 Days</option>
                        </select>

                        <select name="Hours">
                            <option value="0">0 Hour</option>
                            <option value="1">1 Hour</option>
                            <option value="2">2 Hours</option>
                            <option value="3">3 Hours</option>
                            <option value="4">4 Hours</option>
                            <option value="5">5 Hours</option>
                            <option value="6">6 Hours</option>
                            <option value="7">7 Hours</option>
                            <option value="8">8 Hours</option>
                            <option value="9">9 Hours</option>
                            <option value="10">10 Hours</option>
                            <option value="11">11 Hours</option>
                            <option value="12">12 Hours</option>
                            <option value="13">13 Hours</option>
                            <option value="14">14 Hours</option>
                            <option value="15">15 Hours</option>
                            <option value="16">16 Hours</option>
                            <option value="17">17 Hours</option>
                            <option value="18">18 Hours</option>
                            <option value="19">19 Hours</option>
                            <option value="20">20 Hours</option>
                            <option value="21">21 Hours</option>
                            <option value="22">22 Hours</option>
                            <option value="23">23 Hours</option>
                            <option value="24">24 Hours</option>
                        </select>

                        <select name="Minutes" class="pull-right">
                            <option value="1">1 Minute</option>
                            <option value="5" selected="selected">5 Minutes</option>
                            <option value="10">10 Minutes</option>
                            <option value="15">15 Minutes</option>
                            <option value="20">20 Minutes</option>
                            <option value="25">25 Minutes</option>
                            <option value="30">30 Minutes</option>
                            <option value="35">35 Minutes</option>
                            <option value="40">40 Minutes</option>
                            <option value="45">45 Minutes</option>
                            <option value="50">50 Minutes</option>
                            <option value="55">55 Minutes</option>
                            <option value="60">60 Minutes</option>
                        </select>
                    </div>


                    <div class="clearfix"></div>
                </div>
            </div>
        </div>
    </div>
</Template>
