<template name="mailing_list_container">
    <br>
    <div class="container" style="background-color:#fff">
        <div class="row">
          {{> knotable_active_users knotableWeeklyUpdate}}
          {{> knote_mailing_list knoteBlogList}}
        </div>
    </div>
</template>

<template name="knotable_active_users">
    <div class="col-xs-10 col-xs-offset-1 col-md-6 col-md-offset-0 mailing-list mailgun-mailing-list form-horizontal" data-id="{{_id}}">
        <h3>Knotable Active Users</h3>
        <div class="form-group">
            <label class="col-sm-2" for="mailing_list_knotable_weekly_name">Name:</label>
            <div class="col-sm-8">
                <input type="text" class="mailing-list-name form-control"
                       name='mailing_list_knotable_weekly_name' id='mailing_list_knotable_weekly_name' value="{{name}}"/>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-2" for="mailing_list_knotable_weekly_alias">Alias :</label>
            <div class="col-sm-8">
                <div class="input-group">
                  <input type="text" class="form-control mailing-list-alias" placeholder="alias without domain" aria-describedby="basic-addon2" name='mailing_list_knotable_weekly_alias' id='mailing_list_knotable_weekly_alias' value="{{aliasWithoutDomain}}" />
                  <span class="input-group-addon" id="basic-addon2">{{domain}}</span>
                </div>
                <br>
                <button type="button" class="btn btn-primary btn-sm btn-change-properties">Change</button>
            </div>
        </div>



        <div class="form-group">
            <label class="col-sm-2" for="description">Description:</label>
            <div class="col-sm-8">
                <p>{{description}}</p>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-2"></label>
            <div class="col-sm-8">
                <button class="btn btn-primary btn-sm btn-update"><span>Update</span></button>
            </div>
        </div>
    </div>
</template>

<template name="knote_mailing_list">
    <div class="col-xs-10 col-xs-offset-1 col-md-6 col-md-offset-0 mailing-list mailgun-mailing-list form-horizontal" data-id="{{_id}}">
        <h3>Knote.com Mailing List</h3>

        <div class="form-group">
            <label class="col-sm-2" for="mailing_list_knote_blog_name">Name:</label>
            <div class="col-sm-8">
                <input type="text" class="mailing-list-name input-gray form-control"
                       name='mailing_list_knote_blog_name' id='mailing_list_knote_blog_name' value="{{name}}"/>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-2" for="mailing_list_knote_blog_alias">Alias :</label>

            <div class="col-sm-8">

                    <input type="text" class="form-control mailing-list-alias" aria-describedby="basic-addon2" name='mailing_list_knote_blog_alias' id='mailing_list_knote_blog_alias' value="{{aliasWithoutDomain}}" />

                   <!--  <span class="input-group-addon" id="basic-addon2">{{domain}}</span> -->

                <br>
                <button type="button" class="btn btn-primary btn-sm btn-change-properties">Change</button>
            </div>

        </div>

        <div class="form-group">
            <label class="col-sm-2" for="description">Description:</label>
            <div class="col-sm-8">
                <p>{{description}}</p>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2"></label>
            <div class="col-sm-8">
                <button class="btn btn-primary btn-sm btn-update"><span>Update</span></button>
            </div>
        </div>
    </div>
</template>
