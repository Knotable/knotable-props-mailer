<template name="empty_layout">
  <div class="container">{{> yield }}</div>
</template>

<template name="loading">
  <div class="loading-wrapper">
    <div class="profile-main-loader">
      <div class="loader">
        <svg class="circular-loader" viewBox="25 25 50 50">
          <circle
            class="loader-path"
            cx="50"
            cy="50"
            r="20"
            fill="none"
            stroke="#28ade8"
            stroke-width="2"
          />
        </svg>
      </div>
    </div>
  </div>
</template>

<template name="complete_profile">
  <div class="container-fluid">
    <div class="row">
      <div
        class="
          col-xs-10
          col-xs-offset-1
          col-sm-6
          col-sm-offset-3
          col-md-4
          col-md-offset-4
        "
      >
        <form style="margin-top: 80px">
          <h3>Thank you for joining Kmail</h3>
          <p>Please, complete your profile information</p>
          <div class="form-group" style="margin-top: 40px">
            <label for="firstName">First Name</label>
            <input
              class="form-control"
              id="firstName"
              name="firstName"
              placeholder="First Name"
              required
            />
          </div>
          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input
              class="form-control"
              id="lastName"
              name="lastName"
              placeholder="Last Name"
              required
            />
          </div>
          <div style="padding-top: 10px; display: flex; justify-content: center">
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</template>
