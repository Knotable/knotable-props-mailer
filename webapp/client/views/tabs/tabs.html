<template name="nav_tabs">
  <ul class="nav nav-tabs">
    {{#each tabs }}
      <li class="{{#if isActive name }} active {{/if}}"><a class="nav-tab-item"  data-tab-index="{{@index}}">{{ name }}</a></li>
    {{/each}} 
   
  </ul>
<div class="tab-content">
    <div id="tab-compose" class="tab-pane fade in active">
      {{> Template.dynamic template }}
    </div>
  </div>
</template>
