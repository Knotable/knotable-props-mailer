<template name="new_email">
  <div class="email-container col-sm-12">
    {{> file_upload}}
    <div class="row">
      <div
        class="
          col-xs-10 col-xs-offset-1 col-md-5 col-lg-4 col-md-offset-0
          form-horizontal
        "
      >
        <br />
        <br />
        <div class="form-group">
          <label
            class="control-label col-sm-3 col-sm-offset-1"
            for="sender_name"
          >
            Sender Name
          </label>
          <div class="col-sm-8">
            <input
              type="text"
              class="form-control sender-name input-gray"
              value="{{senderName}}"
              name="sender_name"
              id="sender_name"
              placeholder="Sender Name"
            />
          </div>
        </div>

        <div class="form-group">
          <label
            class="control-label col-sm-3 col-sm-offset-1"
            for="from_address"
          >
            Email
          </label>
          <div class="col-sm-8">
            <div class="input-group from-address-group">
              <input
                name="from_address"
                id="from_address"
                value="{{emailLocalPart}}"
                type="text"
                class="form-control from-address input-gray"
                aria-label="..."
                placeholder="Sender Address"
              />
              <div class="input-group-btn">
                <button
                  id="from_address_domain"
                  type="button"
                  class="btn btn-default dropdown-toggle"
                  data-toggle="dropdown"
                  aria-haspopup="true"
                  aria-expanded="false"
                  data-current-domain="{{currentDomain}}"
                >
                  @{{currentDomain}}
                  <span class="caret"></span>
                </button>
                <ul class="dropdown-menu dropdown-menu-right">
                  {{#each domains}}
                  <li><a href="#" data-id="{{this}}">{{this}}</a></li>
                  {{/each}}
                </ul>
              </div>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label
            class="control-label col-sm-3 col-sm-offset-1"
            for="from_address"
          >
            Raw From
          </label>
          <div class="col-sm-8">
            <input class="form-control input-gray" disabled value="{{from}}" />
          </div>
        </div>

        <div class="form-group">
          <label class="control-label col-sm-3 col-sm-offset-1" for="subject">
            Subject
          </label>
          <div class="col-sm-8">
            <input
              type="text"
              class="form-control subject input-gray"
              value="{{subject}}"
              name="subject"
              id="subject"
              placeholder="Subject Text"
            />
          </div>
        </div>

        <div class="form-group">
          <label
            class="control-label col-sm-3 col-sm-offset-1"
            for="recipients"
          >
            To
          </label>
          <div class="col-sm-8">
            <input
              type="text"
              class="form-control recipients input-gray"
              value="{{recipients}}"
              name="recipients"
              id="recipients"
              placeholder="listname@domain-on-mailgun.com list or addresses, comma separated"
            />
          </div>
        </div>

        <div class="form-group">
          <label class="control-label col-sm-3 col-sm-offset-1" for="campaign">
            Campaigns
          </label>
          <div class="col-sm-8">
            <input
              type="text"
              class="form-control input-gray"
              name="campaigns"
              id="campaigns"
              value="{{campaigns}}"
            />
          </div>
        </div>

        <div class="form-group">
          <label class="control-label col-sm-3 col-sm-offset-1" for="tags">
            Tags
          </label>
          <div class="col-sm-8">
            <input
              type="text"
              class="form-control input-gray"
              name="tags"
              id="tags"
              value="{{tags}}"
            />
          </div>
        </div>

        <div class="control-group">
          <hr />
        </div>

        <div class="control-group email-event-action">
          <label class="control-label pull-left">
            Instant test to From address
          </label>
          <div style="overflow: hidden; padding-left: 20px">
            <button class="btn btn-primary btn-sm btn-block btn-test-send">
              <span>Send test</span>
            </button>
          </div>
        </div>

        <div class="control-group">
          <hr />
        </div>

        <div class="control-group calendar-body-wrapper">
          <label class="control-label">Queue a real email</label>
          <p>Select either option. Must be atleast 2 minutes in the future.</p>
          <div class="controls">{{> change_due_date_popup}}</div>
        </div>

        <div class="control-group email-event-action">
          <label class="control-label"></label>
          <div class="controls">
            <button class="btn btn-red btn-sm btn-block btn-send">
              <span>Add Real Email To Queue</span>
            </button>
            <p>You can preview and cancel on the next screen</p>
          </div>
        </div>
      </div>

      <div class="col-xs-10 col-xs-offset-1 col-md-7 col-lg-8 col-md-offset-0">
        <div id="email-edit"></div>
      </div>
    </div>
  </div>
</template>

<template name="email_list">
  <div class="email-event-list">
    <ul class="list-group">
      {{#each email_events}}
      <li class="list-group-item email-box" data-id="{{_id}}">
        {{> email_box }}
      </li>
      {{/each}}
    </ul>
  </div>
</template>

<template name="sent_email_list">
  <div class="email-event-list">
    <ul class="list-group">
      {{#each sent_email_events}}
      <li class="list-group-item email-box sent" data-id="{{_id}}">
        {{> sent_email_box }}
      </li>
      {{/each}}
    </ul>
  </div>
</template>

<template name="email_box">
  <p class="list-group-item-heading">
    <strong>{{subject}}</strong> <br />
    <small>{{date}}</small><small class="pull-right">{{timeFromNow}}</small>
  </p>

  <div class="email-box-actions btn-group btn-group-justified" role="group">
    <!--<a href="#" class="btn btn-primary  change-date edit-email-event">
              <span class="glyphicon glyphicon-time" aria-hidden="true"></span> Change Date
    
            </a>
            <a href="#" class="btn btn-warning make-new" title="This will mark event as sent">
                <span class="glyphicon glyphicon-copy" aria-hidden="true"></span> Make New
            </a>-->
    <a href="#" class="btn btn-danger email-box-badge-delete" data-id="{{_id}}">
      <span class="glyphicon glyphicon-trash" aria-hidden="true"></span> Delete
    </a>
  </div>

  <br />
  <br />

  <div class="email-box-change-date hidden">
    {{> change_due_date_popup due_date}}
    <ul class="list-inline right email-box-date-buttons">
      <button type="button" class="btn btn-primary btn-sm save-update-date">
        Save
      </button>
      <button type="button" class="btn btn-primary btn-sm cancel-update-date">
        Cancel
      </button>
    </ul>
  </div>

  {{#if plainTextFile}} {{> file_attachment_box plainTextFile}} {{/if}} {{#if
  htmlFile}} {{> file_attachment_box htmlFile}} {{/if}}
</template>

<template name="sent_email_box">
  <div style="display: flex">
    <div style="min-width: 150px">
      <div><strong>Subject</strong></div>
      <div><strong>Created at</strong></div>
      <div><strong>Due Date</strong></div>
      <div><strong>From</strong></div>
      <div><strong>Campaign</strong></div>
      <div><strong>Recipients</strong></div>
      <div><strong>Html</strong></div>
    </div>
    <div>
      <div>{{subject}}</div>
      <div>{{displayDate created_time}}</div>
      <div>{{displayDate due_date}}</div>
      <div>{{from}}</div>
      <div>{{joinArray campaigns}}</div>
      <div>{{joinArray recipients}}</div>
      <details>
        <div>{{{html}}}</div>
      </details>
    </div>
  </div>
</template>

<template name="file_attachment_box">
  <div class="file-box file-attachment-box" data-id="{{_id}}">
    <a
      href="{{s3_url}}"
      title="{{name}}"
      file_id="{{_id}}"
      class="file-review"
      target="_blank"
      >Preview</a
    >
    <div class="file {{file_ext}}">
      <a
        href="{{s3_url}}"
        title="{{name}}"
        file_id="{{_id}}"
        class="file-url"
        target="_blank"
      ></a>
    </div>
    <div>{{name}}</div>
  </div>
</template>
