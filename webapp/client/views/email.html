<template name="email_container">
  <ul class="nav nav-tabs">
    <li class="active"><a data-toggle="tab" href="#tab-compose">Compose</a></li>
    <li><a data-toggle="tab" href="#tab-queued">Queued</a></li>
    <li><a data-toggle="tab" href="#tab-sent">Sent</a></li>
  </ul>
  <div class="tab-content">
    <div id="tab-compose" class="tab-pane fade in active">
      {{> new_email}}
    </div>
    <div id="tab-queued" class="tab-pane fade">
      {{> email_list}}
    </div>
    <div id="tab-sent" class="tab-pane fade">
      {{> sent_email_list}}
    </div>
  </div>
</template>



<template name="new_email">
    <div class="email-container col-sm-12" data-id="{{draftEvent._id}}">

      <div class="row">

        <div class="col-xs-10 col-xs-offset-1 col-md-4 col-md-offset-0 form-horizontal">
            <br>
            <br>
            <div class="form-group">
                <label class="control-label col-sm-2 col-sm-offset-1" for="from_address">From</label>
                <div class="col-sm-9">
                    <input type="text" class="form-control from-address input-gray" value="{{draftEvent.from}}"
                           name='from_address' id='from_address' placeholder="Real Name<email@knote.com> must be @knote.com" />
                </div>
            </div>

            <div class="form-group">
                <label class="control-label col-sm-2 col-sm-offset-1" for="subject">Subject</label>
                <div class="col-sm-9">
                    <input type="text" class="form-control subject input-gray" value="{{draftEvent.subject}}"
                           name='subject' id='subject' placeholder="Subject Text"/>
                </div>
            </div>

            <div class="form-group">
                <label class="control-label col-sm-2 col-sm-offset-1" for="recipients">To</label>
                <div class="col-sm-9">
                    <input type="text" class=" form-control recipients input-gray" value="{{draftEvent.recipients}}"
                           name='recipients' id='recipients' placeholder="listname@domain-on-mailgun.com list or addresses, comma separated"/>
                </div>
            </div>
            <div class="form-group">
                <label class="control-label col-sm-2 col-sm-offset-1" for="campaign">Campaign</label>
                <div class="col-sm-9">
                    <input type="text" class="form-control input-gray" name='campaigns' id='campaigns' value="{{draftEvent.campaigns}}"/>
                </div>
            </div>

            <div class="form-group">
                <label class="control-label col-sm-2 col-sm-offset-1" for="tags">Tag</label>
                <div class="col-sm-9">
                    <input type="text" class="form-control input-gray" name='tags' id='tags' value="knote"/> <!--{{draftEvent.tags}}-->
                </div>
            </div>

            <div class="form-group">
                <label class="control-label col-sm-2 col-sm-offset-1">Email HTML</label>
                <div class="col-sm-9">
                    <div class="input-group">
                      <input type="text" class="form-control" placeholder="{{#if htmlFile}}{{htmlFile.name}}{{else}}Edit in the composer and click save{{/if}}" readonly>
                      <span class="input-group-btn">
                       <!-- {{#if htmlFile.s3_url}} -->
                            <!--button class="btn btn-danger delete-file-html" type="button" data-id={{htmlFile._id}}>Delete</button-->
                       <!-- {{else}} -->
                            <button class="btn btn-default btn-select-file-html" type="button">or upload</button>
                       <!-- {{/if}} -->
                      </span>
                    </div>
                    {{> file_upload}}
                </div>
            </div>

            <div class="form-group">
                <label class="control-label col-sm-2 col-sm-offset-1"></label>
                <div class="col-sm-8">
                    {{> file_upload_progress}}
                </div>
            </div>

            <!--
            <div class="form-group">
                <div class="col-sm-9 col-sm-offset-3">
                    <button class="btn btn-primary btn-sm btn-block reset">Reset</button>
                </div>
            </div>
            -->

            <div class="control-group">
              <hr>
            </div>

            <div class="control-group email-event-action">
                <label class="control-label pull-left">Instant test to recipients</label>
                <div style="overflow: hidden; padding-left: 20px;">
                    <button class="btn btn-primary btn-sm btn-block btn-test-send"><span>Send test</span></button>
                </div>
                <!--input type="checkbox" id="include-campaigns-and-tags"> Include Campaigns and Tags -->
            </div>

            <div class="control-group">
              <hr>
            </div>

            <div class="control-group calendar-body-wrapper">
                <label class="control-label">Queue a real email</label>
                <p>Select either option. Must be atleast 2 minutes in the future.</p>
                <div class="controls">
                  {{> change_due_date_popup}}
                </div>
            </div>

            <div class="control-group email-event-action">
              <label class="control-label"></label>
              <div class="controls">
                  <button class="btn btn-red btn-sm btn-block btn-send"><span>Add Real Email To Queue</span></button>
                <p>You can preview and cancel on the next screen</p>
              </div>
            </div>

        </div>

        <div class="col-xs-10 col-xs-offset-1 col-md-8 col-md-offset-0">
          <div id="email-edit"></div>
          <!--<button class="btn btn-primary btn-save">Save to HTML</button>-->
        </div>

      </div>

    </div>

</template>



<template name="email_list">
  <div class="email-event-list">
    <ul class="list-group">
      {{#each email_events}}
        <li class="list-group-item email-box" data-id="{{_id}}">
          {{> email_box }}
        </li>
      {{/each}}
    </ul>
  </div>
</template>



<template name="sent_email_list">
  <div class="email-event-list">
    <ul class="list-group">
      {{#each sent_email_events}}
        <li class="list-group-item email-box sent" data-id="{{_id}}">
          {{> sent_email_box }}
        </li>
      {{/each}}
    </ul>
  </div>
</template>



<template name="email_box">
    <p class="list-group-item-heading">
        <strong>{{subject}}</strong> <br>
        <small>{{date}}</small><small class="pull-right">{{timeFromNow}}</small>
    </p>

    <div class="email-box-actions btn-group btn-group-justified" role="group">
        <!--<a href="#" class="btn btn-primary  change-date edit-email-event">
          <span class="glyphicon glyphicon-time" aria-hidden="true"></span> Change Date

        </a>
        <a href="#" class="btn btn-warning make-new" title="This will mark event as sent">
            <span class="glyphicon glyphicon-copy" aria-hidden="true"></span> Make New
        </a>-->
        <a href="#" class="btn btn-danger  email-box-badge-delete" data-id="{{_id}}">
          <span class="glyphicon glyphicon-trash" aria-hidden="true"></span> Delete
        </a>
    </div>

    <br>
    <br>

    <div class="email-box-change-date hidden">
        {{> change_due_date_popup due_date}}
        <ul class="list-inline right email-box-date-buttons">
            <button type="button" class="btn btn-primary btn-sm save-update-date">Save</button>
            <button type="button" class="btn btn-primary btn-sm cancel-update-date">Cancel</button>
        </ul>
    </div>

    {{#if plainTextFile}}
        {{> file_attachment_box plainTextFile}}
    {{/if}}
    {{#if htmlFile}}
      {{> file_attachment_box htmlFile}}
    {{/if}}

</template>



<template name="sent_email_box">
    <p class="list-group-item-heading">
        <strong>{{subject}}</strong>
    </p>


    <dl class="dl-horizontal">
      <dt>Created at</dt> <dd>{{displayDate created_time}}</dd>
      <dt>Due Date</dt> <dd>{{displayDate due_date}}</dd>
      <dt>From</dt> <dd>{{from}}</dd>
      <dt>Campaign</dt> <dd>{{joinArray campaigns}}</dd>
      {{#if file}}
        <dt>Html</dt> <dd><a href="{{file.s3_url}}" target="_blank">{{file.name}}</a> </dd>
      {{/if}}
      <dt>Recipients</dt> <dd>{{joinArray recipients}}</dd>
    </dl>



</template>



<template name="file_attachment_box">
    <div class="file-box file-attachment-box" data-id="{{_id}}">
        <a href="{{s3_url}}" title="{{name}}" file_id="{{_id}}" class="file-review" target="_blank" >Preview</a>
        <div class="file {{file_ext}}">
            <a href="{{s3_url}}" title="{{name}}" file_id="{{_id}}" class="file-url" target="_blank" ></a>
        </div>
        <div>{{name}}</div>
    </div>
</template>
