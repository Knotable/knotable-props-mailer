version: "3.9"

services:
  api:
    image: ${IMAGE}:${IMAGE_TAG}
    restart: always
    hostname: ${HOSTNAME}
    ports:
      - "80:3000"
    environment:
      PORT: 3000
      ROOT_URL: ${ROOT_URL}
      METEOR_SETTINGS: ${METEOR_SETTINGS}
      MONGO_URL: "mongodb://database/service-db"
      MAILGUN_API_KEY: ${MAILGUN_API_KEY}
      MAILGUN_DOMAINS: ${MAILGUN_DOMAINS}
    volumes:
      - /knotable-var:/logs
    command: /bin/sh -c 'node main.js 1>>/logs/forever.log 2>&1'
    depends_on:
      - database
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "10m"

  database:
    image: mongo:4.4
    restart: always
    volumes:
      - /knotable-var/props_db:/data/db
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "10m"
